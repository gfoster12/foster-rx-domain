name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.FIREBASE_DEPLOY_SA }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project fosterrx-prod --non-interactive

      - name: Verify deployment
        run: |
          sleep 10
          curl -sI https://fosterrx.com/ | head -3
          curl -sI https://fosterrx.com/.well-known/angis-signing-key-v1.pub | head -3
