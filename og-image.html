<style>
  /* ─── TOKENS ─────────────────────────────────────────────── */
  :root {
    --ink:       #0e1c18;
    --deep:      #132119;
    --surface:   #1a2e2a;
    --muted:     #2c4440;
    --border:    #3a5550;
    --teal:      #4a8a7d;
    --teal-lt:   #6aaa9d;
    --cream:     #f0ebe0;
    --sand:      #d8d1c2;
    --white:     #ffffff;
    --mono:      'DM Mono', monospace;
    --serif:     'Cormorant Garamond', Georgia, serif;
    --sans:      'DM Sans', sans-serif;
    --r:         4px;
    --r-lg:      10px;
    --ease:      cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ─── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: var(--sans);
    background: var(--ink);
    color: var(--cream);
    line-height: 1.6;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  /* ─── GRAIN OVERLAY ─────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ─── NAV ─────────────────────────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 5vw;
    height: 64px;
    display: flex;
    align-items: center;
    background: rgba(14, 28, 24, 0.88);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(74, 138, 125, 0.12);
    transition: border-color 0.4s;
    position: relative;
  }
  .nav-wordmark {
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--cream);
    font-weight: 400;
    letter-spacing: 0.03em;
    margin-left: 6px;
  }
  nav.scrolled { border-bottom-color: rgba(74, 138, 125, 0.25); }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    text-decoration: none;
  }
  .nav-logo svg { width: 28px; height: 28px; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .nav-links a {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sand);
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--teal-lt); }

  .nav-cta {
    margin-left: auto;
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid var(--teal);
    color: var(--teal-lt);
    border-radius: var(--r);
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
  }
  .nav-cta:hover { background: var(--teal); color: var(--ink); }

  /* ─── HERO ────────────────────────────────────────────────── */
  #hero {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 120px 5vw 80px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 60% 40%, rgba(74,138,125,0.13) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 80%, rgba(74,138,125,0.07) 0%, transparent 60%),
      var(--ink);
  }
  .hero-grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,138,125,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,138,125,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
  }

  .hero-inner {
    position: relative;
    max-width: 900px;
    text-align: center;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.2s forwards;
  }
  .hero-eyebrow::before, .hero-eyebrow::after {
    content: '';
    width: 40px; height: 1px;
    background: var(--teal);
    opacity: 0.5;
  }

  .hero-headline {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 6vw, 5.2rem);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 1s var(--ease) 0.4s forwards;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--teal-lt);
  }

  .hero-sub {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--sand);
    max-width: 560px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 1s var(--ease) 0.6s forwards;
  }

  .hero-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 1s var(--ease) 0.8s forwards;
  }

  .btn-primary {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: var(--teal);
    color: var(--ink);
    border-radius: var(--r);
    border: 1px solid var(--teal);
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--teal-lt); transform: translateY(-1px); }

  .btn-secondary {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: transparent;
    color: var(--cream);
    border-radius: var(--r);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-secondary:hover { border-color: var(--teal); color: var(--teal-lt); transform: translateY(-1px); }


  /* ─── PROOF STRIP ─────────────────────────────────────────── */
  #proof {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 32px 5vw;
  }
  .proof-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0;
  }
  .proof-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 2rem;
    border-right: 1px solid var(--border);
  }
  .proof-item:first-child { padding-left: 0; }
  .proof-item:last-child { border-right: none; }
  .proof-dot {
    width: 8px; height: 8px;
    background: var(--teal);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .proof-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--sand);
  }

  /* ─── SECTION BASICS ─────────────────────────────────────── */
  section { padding: 100px 5vw; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--white);
    margin-bottom: 1.5rem;
  }
  .section-title em { font-style: italic; color: var(--teal-lt); }
  .section-body {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--sand);
    line-height: 1.8;
    max-width: 620px;
  }

  /* reveal class - purely decorative, no hiding */
  .reveal { opacity: 1; }

  /* ─── THE PROBLEM ─────────────────────────────────────────── */
  #problem { background: var(--deep); }
  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5vw;
    align-items: start;
    margin-top: 4rem;
  }
  .stat-cards {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .stat-card:hover { border-color: var(--teal); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--teal);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .stat-card:hover::before { opacity: 1; }
  .stat-number {
    font-family: var(--mono);
    font-size: 2.8rem;
    font-weight: 300;
    color: var(--teal-lt);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .stat-desc {
    font-size: 0.88rem;
    color: var(--sand);
    font-weight: 300;
    line-height: 1.5;
  }

  .problem-causes {
    padding-top: 1rem;
  }
  .cause-item {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
  }
  .cause-item:last-child { border-bottom: none; }
  .cause-num {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--teal);
    opacity: 0.7;
    flex-shrink: 0;
    padding-top: 3px;
    letter-spacing: 0.1em;
  }
  .cause-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.35rem;
  }
  .cause-body {
    font-size: 0.85rem;
    color: var(--sand);
    font-weight: 300;
    line-height: 1.6;
  }

  /* ─── SOLUTION ────────────────────────────────────────────── */
  #solution { background: var(--ink); }
  .solution-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 4rem;
    width: 100%;
  }
  .feature-cards {
    display: grid;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .feature-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2.25rem 2rem;
    transition: border-color 0.3s, transform 0.3s;
  }
  .feature-card:hover { border-color: var(--teal); transform: translateY(-3px); }
  .feature-icon {
    width: 36px; height: 36px;
    margin-bottom: 1rem;
    color: var(--teal);
  }
  .feature-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.5rem;
  }
  .feature-desc {
    font-size: 0.8rem;
    color: var(--sand);
    font-weight: 300;
    line-height: 1.6;
  }

  /* ─── PIPELINE VIZ ────────────────────────────────────────── */
  .pipeline-viz {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2rem;
  }
  .pipeline-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1.5rem;
  }
  .pipeline-steps {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .pipeline-step {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(74,138,125,0.1);
    position: relative;
  }
  .pipeline-step:last-child { border-bottom: none; }
  .step-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 24px;
  }
  .step-dot {
    width: 10px; height: 10px;
    border: 1.5px solid var(--teal);
    border-radius: 50%;
    background: var(--ink);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .step-line {
    width: 1px;
    flex: 1;
    min-height: 20px;
    background: linear-gradient(var(--teal), transparent);
    opacity: 0.3;
    margin-top: 4px;
  }
  .step-content {}
  .step-num {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--teal);
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .step-name {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 2px;
  }
  .step-event {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--border);
    letter-spacing: 0.06em;
  }

  /* ─── OFFERINGS ───────────────────────────────────────────── */
  #offerings { background: var(--deep); }
  .offerings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 4rem;
  }
  .offering-card {
    border-radius: var(--r-lg);
    padding: 2rem;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
    display: flex;
    flex-direction: column;
  }
  .offering-card:hover { border-color: var(--teal); transform: translateY(-4px); }
  .offering-card.dark { background: var(--surface); }
  .offering-card.light { background: rgba(74,138,125,0.06); }
  .offering-tag {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1.2rem;
    padding: 4px 10px;
    border: 1px solid rgba(74,138,125,0.3);
    border-radius: 2px;
    display: inline-block;
    align-self: flex-start;
  }
  .offering-title {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.75rem;
    line-height: 1.25;
  }
  .offering-body {
    font-size: 0.85rem;
    color: var(--sand);
    font-weight: 300;
    line-height: 1.7;
    flex: 1;
    margin-bottom: 1.5rem;
  }
  .offering-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .offering-features li {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--sand);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .offering-features li::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--teal);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .offering-link {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    margin-top: auto;
    transition: gap 0.2s;
  }
  .offering-link:hover { gap: 14px; }
  .offering-link::after { content: '→'; }
  .offering-btn {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal-lt);
    border-radius: var(--r);
    margin-top: auto;
    align-self: flex-start;
    transition: background 0.2s, color 0.2s;
    text-decoration: none;
  }
  .offering-btn:hover { background: var(--teal); color: var(--ink); }

  /* ─── TRACTION ────────────────────────────────────────────── */
  #traction {
    background: var(--surface);
    padding: 48px 5vw;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .traction-chips {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .traction-chip {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--sand);
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--deep);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .traction-chip-dot {
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
  }

  /* ─── TEAM ────────────────────────────────────────────────── */
  #team { background: var(--ink); }
  .team-card {
    max-width: 700px;
    margin-top: 4rem;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3rem;
    align-items: start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 2.5rem;
  }
  .team-photo {
    width: 120px; height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--teal);
    background: var(--muted);
  }
  .team-name {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.25rem;
  }
  .team-role {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1rem;
  }
  .team-bio {
    font-size: 0.88rem;
    color: var(--sand);
    font-weight: 300;
    line-height: 1.7;
    margin-bottom: 1.25rem;
  }
  .affil-logos {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid rgba(74,138,125,0.12);
  }
  .affil-logos-img {
    width: 100%;
    max-width: 580px;
    height: auto;
    display: block;
    border-radius: 8px;
    opacity: 0.88;
    mix-blend-mode: screen;
  }
  .researcher-badges {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
